services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - NODE_ENV=production
      - EXECUTIONS_MODE=regular
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-change_me_strong}
      - TZ=Asia/Tokyo
    volumes:
      - n8n-docker_n8n_data:/home/node/.n8n    # ← now points to your real data
      - ./local_files:/files
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    container_name: caddy_serv
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - $PWD/interface/conf:/etc/caddy
      - $PWD/interface/site:/srv
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  n8n-docker_n8n_data:      # ← this line makes sure Docker never recreates it
    external: true
  qdrant_data:
  redis_data:
  caddy_data:
  caddy_config:
